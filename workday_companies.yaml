# ============================================================================
# Workday job-alert companies — THE file to edit for Workday notifications.
#
# Add a company below and the next crawl/run-once picks it up automatically
# (no other command needed; `h1b-alerts sync-workday` syncs it manually).
# Removing an entry disables its feed on the next sync. Set `enabled: false`
# to pause a company without deleting it.
#
# After editing, verify your URLs live in seconds:
#     python scripts/validate_workday.py
#
# HOW TO FIND A COMPANY'S WORKDAY URL
#   Open the company's careers site and click "Search jobs" / "Apply" until
#   the address bar shows myworkdayjobs.com (or myworkdaysite.com), e.g.
#     https://nvidia.wd5.myworkdayjobs.com/NVIDIAExternalCareerSite
#   Any page of the board works — home page, a search page, even a single
#   job posting — the crawler derives the board from it. Accepted forms:
#     https://{tenant}.{dc}.myworkdayjobs.com/{site}
#     https://{tenant}.{dc}.myworkdayjobs.com/en-US/{site}
#     https://{tenant}.{dc}.myworkdayjobs.com/en-US/{site}/job/{location}/{title}
#     https://{dc}.myworkdaysite.com/recruiting/{tenant}/{site}
#     https://{tenant}.{dc}.myworkdayjobs.com/wday/cxs/{tenant}/{site}/jobs
#
# FILTERING (recommended for big boards)
#   Workday caps search results at ~2,000 postings per query, so filter huge
#   boards (Accenture, Nvidia, ...) to the jobs you care about. Apply the
#   filters in the company's Workday UI (country, keyword, ...) and copy the
#   resulting URL here — its query parameters are forwarded to the crawl:
#     ?q=software+engineer      keyword search (works on every tenant)
#     ?locationCountry=...      country filter (facet names vary per tenant:
#                               some use locationCountry, others
#                               locationHierarchy1 — always copy from the UI,
#                               don't hand-craft)
#   Examples (United States only, both verified live):
#     url: https://adobe.wd5.myworkdayjobs.com/external_experienced?locationCountry=bc33aa3152ec42d4995f4791a106ed09
#     url: https://nvidia.wd5.myworkdayjobs.com/NVIDIAExternalCareerSite?locationHierarchy1=2fcb99c455831013ea52fb338f2932d8
#   A wrong facet name makes the tenant return HTTP 400 — the validate
#   script catches this immediately.
#
#   Bonus: when a feed is filtered to one country, postings whose location
#   shows only "N Locations" inherit that country for matching.
#
# CHANGING A URL (even just its query string) re-creates the feed, so already
# -seen jobs from that company are treated as new once — expect a one-time
# repeat digest for it. Company name changes behave the same way.
#
# MULTIPLE CAREER SITES for one company: use `urls:` with a list.
#
# NOTE: if you also run the H1B-500 discovery pipeline (discover-feeds),
# avoid listing the same tenant both here and in data/company_feeds.yaml —
# duplicate notifications are prevented either way, but the tenant would be
# crawled twice.
#
# All entries below were verified live on 2026-07-02.
# (Walmart and IBM no longer run public Workday boards — their old tenants
# return 410/422; they use first-party career portals now.)
# ============================================================================

