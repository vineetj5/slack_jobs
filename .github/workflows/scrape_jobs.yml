name: Job Scraper (Every 45 min)

on:
  schedule:
    # Run every 45 minutes (fires at :00 and :45 of each hour)
    - cron: '*/45 * * * *'
  # Allow manual triggering from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run job scraper
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python notify_jobs.py
          
      - name: Upload extracted jobs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-jobs-data
          path: output/
          retention-days: 7

      - name: Persist last run timestamp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_run.txt
          git diff --cached --quiet || git commit -m "chore: update last_run.txt [skip ci]"
          git push
