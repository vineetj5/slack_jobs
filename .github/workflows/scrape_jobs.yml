name: Hourly Greenhouse Job Scraper

on:
  schedule:
    # Run at minute 0 past every hour
    - cron: '0 * * * *'
  # Allow manual triggering from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run job scraper
        env:
          # Pulls the secret configured in GitHub repository settings
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python notify_jobs.py
          
      - name: Upload extracted jobs as artifact
        uses: actions/upload-artifact@v4
        # Uploads the generated CSV/JSON files so you can easily download them from the Actions UI if needed
        with:
          name: latest-jobs-data
          path: output/
          retention-days: 7
